<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">

</head>
<body>
    <div class="container">
        <header>
            <h2>
                Weather Dashboard
            </h2>
            <button id="refreshBtn">Refresh</button>
        </header>
        <!--Weather card information-->
        <div class="weather-card">
            <h2 id="cityName"></h2>
            <h1 id="temperature"></h1>
            <p id="description"></p>
            <!--additional weather details-->
            <div class="details">
                <p id="humidity"></p>
                <p id="wind"></p>
            </div>
           
        </div>

        <h3>5 Day Forecast</h3>

        <div id="forecastContainer" class="forecast"></div>
         <!--Detailed city page-->
            <button id="viewCity">View Details</button>
    </div>
    <!--Dash functionality-->
    <script src="js/dashboard.js"></script>
    
</body>
</html>
